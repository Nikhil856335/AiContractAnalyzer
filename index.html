<!DOCTYPE html>
<html>
<head>
  <title>Live Score Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🏏 Live Sports Score Tracker</h1>

<div class="container">

  <div class="score-box">
    <h2 id="teamA">Team A</h2>
    <h3 id="scoreA">0</h3>
    <button onclick="addScore('A')">+1 Run</button>
  </div>

  <div class="score-box">
    <h2 id="teamB">Team B</h2>
    <h3 id="scoreB">0</h3>
    <button onclick="addScore('B')">+1 Run</button>
  </div>

</div>

<div class="controls">
  <button onclick="resetMatch()">Reset Match</button>
</div>

<h2 id="status">Match Status: LIVE 🔴</h2>

<script src="script.js"></script>
</body>
</html>
